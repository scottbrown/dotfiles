<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__YEAR__ Financials</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2430; --line:#283040;
    --txt:#e6edf3; --dim:#8b949e; --accent:#58a6ff;
    --green:#3fb950; --red:#f85149; --amber:#e3b341;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--txt);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  header{padding:14px 18px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    position:sticky;top:0;background:var(--bg);z-index:20}
  h1{font-size:18px;margin:0;font-weight:650}
  h1 .yr{color:var(--accent)}
  .meta{color:var(--dim);font-size:12px}
  .search{flex:1;min-width:180px;display:flex;gap:8px;align-items:center}
  .search input{flex:1;background:var(--panel);border:1px solid var(--line);
    color:var(--txt);padding:9px 12px;border-radius:9px;font-size:14px;min-width:120px}
  .search input::placeholder{color:var(--dim)}
  select{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    padding:9px 10px;border-radius:9px;font-size:13px}
  .tabs{display:none;gap:6px;padding:10px 18px 0}
  .tab{flex:1;text-align:center;background:var(--panel);border:1px solid var(--line);
    color:var(--dim);padding:9px;border-radius:9px;cursor:pointer;font-weight:600}
  .tab.on{color:var(--txt);border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent) inset}
  main{display:grid;grid-template-columns:1fr 380px;gap:0;
    height:calc(100vh - 59px)}
  .col{overflow-y:auto;padding:14px 18px 60px}
  .col.entries{border-right:1px solid var(--line)}
  .col h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;
    color:var(--dim);margin:0 0 10px;font-weight:600;
    position:sticky;top:-14px;background:var(--bg);padding:6px 0;z-index:5}
  .count{color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0}

  .mhead{color:var(--accent);font-size:12px;font-weight:700;letter-spacing:.5px;
    margin:16px 0 6px;text-transform:uppercase}
  .txn{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;margin-bottom:8px;cursor:pointer}
  .txn:hover{border-color:#3a455a}
  .txn .row1{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
  .txn .payee{font-weight:600}
  .txn .date{color:var(--dim);font-size:12px;font-variant-numeric:tabular-nums;
    white-space:nowrap}
  .txn .amt{font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
  .txn .tags{margin-top:3px;display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:11px;color:var(--dim);background:var(--panel2);
    border:1px solid var(--line);border-radius:20px;padding:1px 8px}
  .txn .postings{display:none;margin-top:8px;border-top:1px solid var(--line);
    padding-top:8px}
  .txn.open .postings{display:block}
  .post{display:flex;justify-content:space-between;gap:10px;
    font-variant-numeric:tabular-nums;padding:2px 0}
  .post .acct{color:var(--dim);word-break:break-word}
  .post.virtual .acct{font-style:italic;opacity:.8}
  .pos{color:var(--green)} .neg{color:var(--red)}
  .empty{color:var(--dim);padding:20px 4px}

  .node{margin:1px 0}
  .node .bar{display:flex;justify-content:space-between;gap:8px;
    padding:5px 6px;border-radius:7px;cursor:pointer;align-items:center}
  .node .bar:hover{background:var(--panel)}
  .node .nm{display:flex;align-items:center;gap:5px;min-width:0}
  .node .tw{width:13px;color:var(--dim);flex:none;font-size:11px;text-align:center}
  .node .lbl{word-break:break-word}
  .node .val{font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:500}
  .kids{margin-left:13px;border-left:1px solid var(--line);padding-left:4px}
  .summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px}
  .card .k{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .card .v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
  .card.wide{grid-column:1 / -1}

  @media (max-width:760px){
    main{grid-template-columns:1fr;height:auto}
    .col{height:calc(100vh - 160px)}
    .col.entries{border-right:none}
    .tabs{display:flex}
    main.show-bal .col.entries{display:none}
    main:not(.show-bal) .col.balances{display:none}
    header h1 .full{display:none}
  }
</style>
</head>
<body>
<header>
  <h1><span class="yr">__YEAR__</span> <span class="full">Financials</span></h1>
  <div class="search">
    <input id="q" type="search" placeholder="Search payee, account, amount, cardholder, file…"
           autocomplete="off">
    <select id="month"></select>
  </div>
</header>
<div class="tabs">
  <div class="tab on" data-pane="entries">Entries</div>
  <div class="tab" data-pane="balances">Balances</div>
</div>
<main>
  <div class="col entries">
    <h2>Entries <span class="count" id="ecount"></span></h2>
    <div id="list"></div>
  </div>
  <div class="col balances">
    <h2>Balances</h2>
    <div id="summary" class="summary"></div>
    <div id="tree"></div>
    <div class="meta" id="gen" style="margin-top:20px"></div>
  </div>
</main>
<script>
const DATA = __DATA__;

const money = v => (v<0?'-$':'$') + Math.abs(v).toLocaleString('en-CA',
  {minimumFractionDigits:2, maximumFractionDigits:2});
const cls = v => v<0 ? 'neg' : 'pos';

/* ---------- balance tree ---------- */
function buildTree(rows){
  const root = {name:'', full:'', amount:0, kids:{}};
  for(const {account, amount} of rows){
    const parts = account.split(':');
    let node = root;
    let full = '';
    node.amount += amount;
    for(const p of parts){
      full = full ? full+':'+p : p;
      if(!node.kids[p]) node.kids[p] = {name:p, full, amount:0, kids:{}};
      node = node.kids[p];
      node.amount += amount;
    }
  }
  return root;
}
const TREE = buildTree(DATA.balances);

function topTotal(name){
  const key = Object.keys(TREE.kids).find(k=>k.toLowerCase()===name.toLowerCase());
  return key ? TREE.kids[key].amount : 0;
}
function renderSummary(){
  const assets = topTotal('assets');
  const liab = topTotal('liabilities');
  const income = -topTotal('income');
  const expenses = topTotal('expenses');
  const net = assets + liab;
  const cards = [
    ['Net worth', net, true],
    ['Assets', assets, false],
    ['Liabilities', liab, false],
    ['Income', income, false],
    ['Expenses', -expenses, false],
  ];
  document.getElementById('summary').innerHTML = cards.map(([k,v,wide])=>
    `<div class="card${wide?' wide':''}"><div class="k">${k}</div>`+
    `<div class="v ${cls(v)}">${money(v)}</div></div>`).join('');
}

const COLLAPSED = new Set();
function nodeHTML(node, depth){
  const kids = Object.values(node.kids).sort((a,b)=>
    Math.abs(b.amount)-Math.abs(a.amount));
  const hasKids = kids.length>0;
  const open = !COLLAPSED.has(node.full);
  let h = `<div class="node">`+
    `<div class="bar" data-acct="${node.full}" data-has="${hasKids}">`+
      `<span class="nm"><span class="tw">${hasKids?(open?'▾':'▸'):''}</span>`+
      `<span class="lbl">${node.name}</span></span>`+
      `<span class="val ${cls(node.amount)}">${money(node.amount)}</span>`+
    `</div>`;
  if(hasKids && open){
    h += `<div class="kids">`+kids.map(k=>nodeHTML(k,depth+1)).join('')+`</div>`;
  }
  return h+`</div>`;
}
function renderTree(){
  const order = ['assets','liabilities','income','expenses','EQUITY'];
  const tops = Object.values(TREE.kids).sort((a,b)=>{
    const ai=order.findIndex(o=>a.name.toLowerCase().startsWith(o.toLowerCase()));
    const bi=order.findIndex(o=>b.name.toLowerCase().startsWith(o.toLowerCase()));
    return (ai<0?9:ai)-(bi<0?9:bi);
  });
  document.getElementById('tree').innerHTML = tops.map(n=>nodeHTML(n,0)).join('');
}
document.getElementById('tree').addEventListener('click', e=>{
  const bar = e.target.closest('.bar');
  if(!bar) return;
  const acct = bar.dataset.acct;
  if(bar.dataset.has==='true' && !e.target.classList.contains('lbl')){
    COLLAPSED.has(acct) ? COLLAPSED.delete(acct) : COLLAPSED.add(acct);
    renderTree();
  } else {
    document.getElementById('q').value = acct;
    applyFilter();
    if(window.matchMedia('(max-width:760px)').matches) showPane('entries');
    document.querySelector('.col.entries').scrollTop = 0;
  }
});

/* ---------- entries ---------- */
function txnTotal(t){
  return t.postings.filter(p=>!p.virtual && p.commodity==='$' && p.amount>0)
                   .reduce((s,p)=>s+p.amount,0);
}
function txnSearchText(t){
  return (t.payee+' '+t.date+' '+(t.file||'')+' '+(t.cardholder||'')+' '+
    t.postings.map(p=>p.account+' '+(p.display||'')).join(' ')).toLowerCase();
}
DATA.transactions.forEach(t=>{ t._txt = txnSearchText(t); t._tot = txnTotal(t); });

function postingHTML(p){
  const v = p.display ? `<span class="${p.amount!=null?cls(p.amount):''}">${p.display}</span>` : '';
  return `<div class="post ${p.virtual?'virtual':''}">`+
    `<span class="acct">${p.account}</span>${v}</div>`;
}
function txnHTML(t){
  const tags = [];
  if(t.cardholder) tags.push(`<span class="chip">👤 ${t.cardholder}</span>`);
  if(t.file && t.file!=='MISSING' && t.file!=='NOT PROVIDED')
    tags.push(`<span class="chip">📄 ${t.file}</span>`);
  else if(t.file) tags.push(`<span class="chip">no receipt</span>`);
  return `<div class="txn" data-id="${t.id}">`+
    `<div class="row1"><span class="payee">${t.payee}</span>`+
      `<span class="date">${t.date}</span></div>`+
    `<div class="row1"><span class="amt">${money(t._tot)}</span></div>`+
    (tags.length?`<div class="tags">${tags.join('')}</div>`:'')+
    `<div class="postings">${t.postings.map(postingHTML).join('')}</div>`+
  `</div>`;
}

const listEl = document.getElementById('list');
const qEl = document.getElementById('q');
const monthEl = document.getElementById('month');

function months(){
  const set = [...new Set(DATA.transactions.map(t=>t.month))].sort();
  monthEl.innerHTML = `<option value="">All months</option>`+
    set.map(m=>{const d=new Date(m+'-01');
      return `<option value="${m}">${d.toLocaleDateString('en-CA',
        {month:'long'})}</option>`;}).join('');
}

function applyFilter(){
  const q = qEl.value.trim().toLowerCase();
  const mo = monthEl.value;
  const terms = q.split(/\s+/).filter(Boolean);
  const rows = DATA.transactions.filter(t=>{
    if(mo && t.month!==mo) return false;
    return terms.every(term=>t._txt.includes(term));
  });
  document.getElementById('ecount').textContent =
    `(${rows.length} of ${DATA.transactions.length})`;
  if(!rows.length){ listEl.innerHTML = `<div class="empty">No matching entries.</div>`; return; }
  let html='', lastMonth='';
  for(const t of rows){
    if(t.month!==lastMonth){ lastMonth=t.month;
      html += `<div class="mhead">${t.monthName} ${DATA.year}</div>`; }
    html += txnHTML(t);
  }
  listEl.innerHTML = html;
}
listEl.addEventListener('click', e=>{
  const card = e.target.closest('.txn');
  if(card) card.classList.toggle('open');
});
qEl.addEventListener('input', applyFilter);
monthEl.addEventListener('change', applyFilter);

/* ---------- mobile tabs ---------- */
function showPane(pane){
  document.querySelector('main').classList.toggle('show-bal', pane==='balances');
  document.querySelectorAll('.tab').forEach(t=>
    t.classList.toggle('on', t.dataset.pane===pane));
}
document.querySelectorAll('.tab').forEach(t=>
  t.addEventListener('click', ()=>showPane(t.dataset.pane)));

/* ---------- init ---------- */
months();
renderSummary();
renderTree();
applyFilter();
document.getElementById('gen').textContent =
  `Generated ${DATA.generated} from ${DATA.year}.ledger · `+
  `${DATA.transactions.length} transactions`;
</script>
</body>
</html>
